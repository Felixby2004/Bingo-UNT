services:
  # Backend service
  - type: web
    name: bingo-backend
    env: node
    plan: free
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    root: backend
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bingo-db
          property: connectionString
      - fromGroup: cloudinary-creds

  # Frontend service
  - type: web
    name: bingo-frontend
    env: static
    plan: free
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    publishDir: frontend/dist
    root: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: bingo-backend
          type: web
          property: host

databases:
  - name: bingo-db
    plan: free

envVarGroups:
  - name: cloudinary-creds
    envVars:
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
