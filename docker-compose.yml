services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: bingo_user
      POSTGRES_PASSWORD: bingo_password
      POSTGRES_DB: bingo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://bingo_user:bingo_password@db:5432/bingo_db
      PORT: 3001
      TZ: America/Lima
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
